<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultraviolet-Lite</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; background: #0f0f0f; }
        .nav { height: 60px; background: #1a1a1a; display: flex; align-items: center; padding: 0 20px; gap: 15px; border-bottom: 1px solid #333; }
        input { flex: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid #444; background: #2a2a2a; color: white; outline: none; font-size: 14px; }
        input:focus { border-color: #0084ff; }
        iframe { width: 100%; height: calc(100vh - 61px); border: none; background: white; }
    </style>
</head>
<body>
    <div class="nav">
        <input type="text" id="urlInput" placeholder="Enter URL or search term...">
    </div>
    <iframe id="browser"></iframe>

    <script>
        const input = document.getElementById('urlInput');
        const frame = document.getElementById('browser');

        input.addEventListener('keypress', e => {
            if (e.key === 'Enter') {
                let url = input.value.trim();
                if (!url.includes('.')) url = 'https://www.google.com/search?q=' + encodeURIComponent(url);
                if (!url.startsWith('http')) url = 'https://' + url;
                
                frame.src = '/proxy?url=' + encodeURIComponent(url);
            }
        });

        // Register Service Worker for deep interception
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
</body>
</html>
